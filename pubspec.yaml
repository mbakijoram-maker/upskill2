name: upskill
description: UPskill — Plateforme freelance & réseau créatif (Flutter + Supabase)
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  image_picker: ^1.1.2
  timeago: ^3.6.1
  uuid: ^4.4.0
  http: ^1.2.0
  google_fonts: ^6.2.1
  url_launcher: ^6.3.1
  supabase_flutter: ^2.8.0
  light_compressor: ^2.1.0+1
  video_player: ^2.9.2
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

# ─────────────────────────────────────────────────────────────────────────────
# ICÔNE DE L'APPLICATION — générée à partir de assets/icon/app_icon.png
# Lancer une seule fois (ou chaque fois que le logo change) :
#   flutter pub get
#   dart run flutter_launcher_icons
# Cela génère automatiquement toutes les tailles requises pour Android,
# iOS et Web à partir des deux fichiers sources ci-dessous.
# ─────────────────────────────────────────────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: false
  remove_alpha_ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#FFFFFF"
    theme_color: "#00A3FE"
  windows:
    generate: false
  macos:
    generate: false
